<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgotten Password</title>
    <link href="Forgot-password.css" rel="stylesheet" type="text/css">
</head>
<body>
    <section id="Forgot" class="forgot">
        <div class="wrapper">
            <form id="forgotPasswordForm" action="#" method="POST">
                <h2>Forgot Password</h2>
                <p>Email</p>
                <div class="input-box">
                    <img src="Pictures/user.png" alt="user" /> 
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="input-box" id="otpBox">
                    <input type="text" id="otp" placeholder="Enter OTP" required>
                    <button type="button" id="sendOtpBtn">Send OTP</button> <!-- Added button for "Send OTP" -->
                </div>
                
                <div class="btn-box">
                    <button type="submit" id="submitBtn">SUBMIT</button> <!-- Changed to button for submission -->
                </div>
                <div class="back">
                    <ul> 
                        <li><a href="login.html">Back to the Log-in</a></li>
                    </ul>
                </div>
            </form>
        </div>
    </section>
    <!-- Modal for Reset Password -->
    <div id="resetPasswordModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Reset Password</h2>
            <form id="resetPasswordForm">
                <label for="newPassword">Enter New Password:</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="New Password" required>
                
                <label for="confirmPassword">Confirm New Password:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
                
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>

    <script src="forgot-password.js"></script> 
</body>
</html>

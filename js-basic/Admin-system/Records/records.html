</head>  
<body>
    <section id="Records" class="records">
        <div class="left-container">
            <div class="profile">
                <img src="../../all/Employee-system/Transaction/Pictures/Pics_burger/abc.png" class="profile-pic" id="profilePic">
                
                </div>
               
            <h2>Business Owner</h2> 
            <p>Admin</p>
            <nav>
                <ul>
                    <li><a href="../Dashboard/dashboard.html">DASHBOARD</a></li>
                    <li><a href="../Product/product.html">PRODUCTS</a></li>
                    <li><a href="../Sales/sales.html">CALENDAR</a></li>
                    <li><a href="../Inventory/inventory.html">INVENTORY</a></li>

                    <li><a href="#" class="active">RECORDS</a></li>
                    <li><a href="../Mail/mail.html">MAIL</a></li>
                </ul>
            </nav>
            <div class="logout">
                <a href="../../all/Employee-system/Login-forgot/login.html" rel="stylesheet" type="text/css"><img src="../index_admin/pictures/Exita.png" alt="Exit" /> Log Out</a>
            </div>
        </div>

        <div class="main-content">
            <div class="top-container">
                <h2>Records</h2>
            </div>
        
        <div class="Records-Container"> 

            <!-- Add this inside the Records-Container div -->
        <div class="List-records">
            <!-- Update the NumberActive div -->
        <div class="NumberActive">
            Active: <span id="activeCount">0</span>
        </div>
    
        
        <h2>Employee List</h2>
        <!-- Add the employee list section -->
        <div class="employee-list">
            <div id="simpleEmployeeList"></div>
        </div>
            
            <div class="addbutton">
            <button id="addUserBtn" class="add-user-btn">Add User</button>
            </div>
        </div>



<div class="records-table">
    <!-- Add search input above the table -->
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search records...">
            </div>
            <div class="scroll-table" id="stocksTable" style="display: block;"> 
            <table id="employeeTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Gmail</th>
                        <th>Date</th> 
                        <th>Time-In</th>
                        <th>Time-Out</th>
                        <th>Status</th> 
                        <th>Time-Taken</th>
                    </tr>
                </thead>
                <tbody id="employeeList">
                </tbody>
            </table>
        </div>
        </div>

        </div>
        </div>
    </section>

    <!-- Add User Modal -->
<div id="addUserModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Add New Employee</h2>
        <form id="addUserForm">
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" pattern=".+@gmail.com" title="Please enter a valid Gmail address" required>

            </div>
            <div class="form-group">
                <label>Last Name:</label>
                <input type="text" id="lastName" required>
            </div>
            <div class="form-group">
                <label>First Name:</label>
                <input type="text" id="firstName" required>
            </div>
            <div class="form-group">
                <label>Middle Name:</label>
                <input type="text" id="middleName">
            </div>
            <div class="form-group">
                <label>Birth Date:</label>
                <input type="date" id="birthDate" required>
            </div>
           
            <button type="submit">Add Employee</button>
            
        </form>
    </div>
</div>

    <script src="../index_admin/index_admin.js"></script>
    <script src="records.js"></script>
</body>
</html>
